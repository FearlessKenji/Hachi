name: Release HachiGen

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach HachiGen.exe to, for example v3.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-hachigen:
    name: build-hachigen
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          $refType = "${{ github.ref_type }}"
          $refName = "${{ github.ref_name }}"
          $inputTag = "${{ github.event.inputs.tag }}"
          $before = "${{ github.event.before }}"
          $shouldRelease = "true"

          if ($inputTag) {
            $tag = $inputTag
          } elseif ($refType -eq "tag") {
            $tag = $refName
          } else {
            $package = Get-Content package.json -Raw | ConvertFrom-Json
            $version = [string]$package.version

            if (-not $version) {
              Write-Error "package.json does not define a version."
              exit 1
            }

            $tag = "v$version"
            $previousVersion = ""

            if ($before -and $before -notmatch "^0+$") {
              $previousPackageText = git show "$before`:package.json" 2>$null

              if ($LASTEXITCODE -eq 0 -and $previousPackageText) {
                $previousPackage = $previousPackageText | ConvertFrom-Json
                $previousVersion = [string]$previousPackage.version
              }
            }

            if ($previousVersion -eq $version) {
              Write-Host "package.json version is still $version; skipping release."
              $shouldRelease = "false"
            }

            git ls-remote --exit-code --tags origin "refs/tags/$tag" *> $null

            if ($LASTEXITCODE -eq 0) {
              Write-Host "Release tag $tag already exists; skipping automatic release."
              $shouldRelease = "false"
            }
          }

          if ($tag -notmatch "^v\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$") {
            Write-Error "Release tag '$tag' must look like v3.2.0."
            exit 1
          }

          "release_tag=$tag" >> $env:GITHUB_OUTPUT
          "should_release=$shouldRelease" >> $env:GITHUB_OUTPUT
          Write-Host "release_tag=$tag"
          Write-Host "should_release=$shouldRelease"

      - name: Set up Node.js
        if: steps.release.outputs.should_release == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            manager/package-lock.json

      - name: Install bot dependencies
        if: steps.release.outputs.should_release == 'true'
        run: npm ci

      - name: Install HachiGen dependencies
        if: steps.release.outputs.should_release == 'true'
        run: npm --prefix manager ci

      - name: Build HachiGen
        if: steps.release.outputs.should_release == 'true'
        run: npm run build:hachigen

      - name: Create release tag
        if: steps.release.outputs.should_release == 'true' && github.ref_type != 'tag' && github.event_name != 'workflow_dispatch'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag $env:RELEASE_TAG
          git push origin $env:RELEASE_TAG

      - name: Create or update GitHub release
        if: steps.release.outputs.should_release == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          $tag = $env:RELEASE_TAG

          if (-not $tag) {
            Write-Error "Release tag was not provided."
            exit 1
          }

          gh release view $tag *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag HachiGen.exe --clobber
            exit $LASTEXITCODE
          }

          gh release create $tag HachiGen.exe --title "Hachi $tag" --generate-notes --latest
          exit $LASTEXITCODE
