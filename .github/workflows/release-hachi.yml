name: Release Hachi

on:
  push:
    branches:
      - main
    tags:
      - "hachi-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Hachi release tag, for example hachi-v3.3.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-hachi:
    name: Release Hachi
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref_name || github.ref }}
          fetch-depth: 0

      - name: Resolve Hachi release tag
        id: release
        shell: pwsh
        run: |
          $refType = "${{ github.ref_type }}"
          $refName = "${{ github.ref_name }}"
          $inputTag = "${{ github.event.inputs.tag }}"
          $before = "${{ github.event.before }}"
          $shouldRelease = "true"
          $tagPrefix = "hachi-v"

          if ($inputTag) {
            $tag = $inputTag
            $version = $tag -replace "^$tagPrefix", ""
          } elseif ($refType -eq "tag") {
            $tag = $refName
            $version = $tag -replace "^$tagPrefix", ""
          } else {
            $package = Get-Content package.json -Raw | ConvertFrom-Json
            $version = [string]$package.version

            if (-not $version) {
              Write-Error "package.json does not define a version."
              exit 1
            }

            $tag = "$tagPrefix$version"
            $previousVersion = ""

            if ($before -and $before -notmatch "^0+$") {
              $previousPackageText = git show "$before`:package.json" 2>$null

              if ($LASTEXITCODE -eq 0 -and $previousPackageText) {
                $previousPackage = $previousPackageText | ConvertFrom-Json
                $previousVersion = [string]$previousPackage.version
              }
            }

            $tagMatches = @(git ls-remote --tags origin "refs/tags/$tag")

            if ($LASTEXITCODE -eq 0) {
              $tagExists = $tagMatches.Count -gt 0
            } else {
              Write-Error "Could not query remote tags."
              exit 1
            }

            if ($tagExists) {
              Write-Host "Hachi release tag $tag already exists; skipping automatic release."
              $shouldRelease = "false"
            } elseif ($previousVersion -eq $version) {
              Write-Host "package.json version is still $version, but $tag does not exist; creating release for the current Hachi version."
            } elseif ($previousVersion) {
              Write-Host "package.json version changed from $previousVersion to $version; creating $tag."
            } else {
              Write-Host "Could not read the previous package.json version; creating $tag because the tag does not exist."
            }
          }

          if ($tag -notmatch "^hachi-v\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$") {
            Write-Error "Hachi release tag '$tag' must look like hachi-v3.3.2."
            exit 1
          }

          if (-not $version) {
            $version = $tag -replace "^$tagPrefix", ""
          }

          "release_tag=$tag" >> $env:GITHUB_OUTPUT
          "release_title=Hachi v$version" >> $env:GITHUB_OUTPUT
          "release_version=$version" >> $env:GITHUB_OUTPUT
          "should_release=$shouldRelease" >> $env:GITHUB_OUTPUT
          Write-Host "release_tag=$tag"
          Write-Host "release_title=Hachi v$version"
          Write-Host "should_release=$shouldRelease"
          exit 0

      - name: Create Hachi release tag
        if: steps.release.outputs.should_release == 'true' && github.ref_type != 'tag' && github.event_name != 'workflow_dispatch'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag $env:RELEASE_TAG
          git push origin $env:RELEASE_TAG

      - name: Create GitHub release
        if: steps.release.outputs.should_release == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.release.outputs.release_title }}
        run: |
          $tag = $env:RELEASE_TAG

          if (-not $tag) {
            Write-Error "Release tag was not provided."
            exit 1
          }

          gh release view $tag *> $null

          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists."
            exit 0
          }

          gh release create $tag --title "$env:RELEASE_TITLE" --generate-notes --latest
          exit $LASTEXITCODE
